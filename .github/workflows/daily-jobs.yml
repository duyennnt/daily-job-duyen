name: daily-jobs

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-jobs
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run job search (sends email via Resend if configured)
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: node scripts/jobs.mjs
      - name: Commit dedupe memory & results
        run: |
          git config user.name "job-bot"
          git config user.email "actions@github.com"
          git add seen-jobs.json jobs-results.json
          git diff --cached --quiet || git commit -m "Job digest $(date -u +%F)"
          git push
